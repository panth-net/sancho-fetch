id: fetch.undp_hdr
version: 1.0.0
type: fetch
catalog_tier: small
entrypoint: main.py:run
description: Fetch UNDP Human Development Report composite indices (HDI, GII, GDI,
  MPI) from the published CSV.
managed_paths:
- module.yaml
- main.py
- api.py
- transform.py
- schema.sample.json
input_schema:
  type: object
  properties:
    year:
      type: integer
    country:
      type: string
    indicator:
      type: string
output_schema:
  type: object
  required:
  - dataset_ref
  - source_url
  - retrieved_at
