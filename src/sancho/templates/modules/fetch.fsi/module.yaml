id: fetch.fsi
version: 1.0.0
type: fetch
catalog_tier: small
entrypoint: main.py:run
description: Fetch Fund for Peace Fragile States Index (FSI) scores from published
  XLSX reports.
managed_paths:
- module.yaml
- main.py
- api.py
- transform.py
- schema.sample.json
input_schema:
  type: object
  properties:
    year:
      type: integer
    country:
      type: string
output_schema:
  type: object
  required:
  - dataset_ref
  - source_url
  - retrieved_at
