id: fetch.ahrq.sdoh
version: 1.0.0
type: fetch
catalog_tier: small
entrypoint: main.py:run
description: 'AHRQ Social Determinants of Health Database public download/link helper.

  Public/no-special-access surface only. If a provider also offers restricted

  microdata or account-gated files, this module intentionally exposes only the

  public aggregate, catalog, report, or download-link surface.

  '
managed_paths:
- module.yaml
- main.py
- schema.sample.json
input_schema:
  type: object
  properties:
    endpoint:
      type: string
      description: Override the official default endpoint or source page.
      default: https://www.ahrq.gov/sdoh/data-analytics/sdoh-data.html
    params:
      type: object
      description: Query parameters for API endpoints or source pages.
    mode:
      type: string
      enum:
      - json
      - html_links
      description: Fetch JSON rows or extract public links from an official page.
      default: html_links
    search:
      type: string
      description: Optional link filter used when mode is html_links.
      default: data
    limit:
      type: integer
      description: Maximum rows or links to return.
      default: 25
output_schema:
  type: object
  required:
  - dataset_ref
  - endpoint
  - rows
  - retrieved_at
