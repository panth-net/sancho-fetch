id: fetch.un_egdi
version: 1.0.0
type: fetch
catalog_tier: small
entrypoint: main.py:run
description: Fetch UN E-Government Development Index (EGDI) scores from the UN Public
  Administration portal.
managed_paths:
- module.yaml
- main.py
- api.py
- transform.py
- schema.sample.json
input_schema:
  type: object
  properties:
    year:
      type: integer
    country:
      type: string
output_schema:
  type: object
  required:
  - dataset_ref
  - source_url
  - retrieved_at
