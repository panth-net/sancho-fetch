id: fetch.overture_maps
version: 1.0.0
type: fetch
catalog_tier: small
entrypoint: main.py:run
description: 'Fetch Overture Maps geospatial data for an area of interest (AOI). WARNING:
  Requires DuckDB with spatial extension. Full dataset is ~500GB; always scope queries
  to a bounding box.'
managed_paths:
- module.yaml
- main.py
- api.py
- transform.py
- schema.sample.json
input_schema:
  type: object
  required:
  - bbox
  properties:
    bbox:
      type: array
      description: Bounding box [min_lon, min_lat, max_lon, max_lat]
    theme:
      type: string
    release:
      type: string
    limit:
      type: integer
output_schema:
  type: object
  required:
  - dataset_ref
  - source_url
  - retrieved_at
