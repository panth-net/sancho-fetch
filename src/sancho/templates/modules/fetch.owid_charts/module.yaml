id: fetch.owid_charts
version: 1.0.0
type: fetch
catalog_tier: small
entrypoint: main.py:run
description: Search and download Our World in Data chart data (CSV) and metadata by
  keyword or slug.
managed_paths:
- module.yaml
- main.py
- api.py
- transform.py
- schema.sample.json
input_schema:
  type: object
  properties:
    slug:
      type: string
    search:
      type: string
    limit:
      type: integer
output_schema:
  type: object
  required:
  - dataset_ref
  - source_url
  - retrieved_at
