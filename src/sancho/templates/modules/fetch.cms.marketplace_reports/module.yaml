id: fetch.cms.marketplace_reports
version: 1.0.0
type: fetch
catalog_tier: small
entrypoint: main.py:run
description: 'CMS Marketplace open enrollment public reports link helper.

  Public/no-special-access surface only. If a provider also offers restricted

  microdata or account-gated files, this module intentionally exposes only the

  public aggregate, catalog, report, or download-link surface.

  '
managed_paths:
- module.yaml
- main.py
- schema.sample.json
input_schema:
  type: object
  properties:
    endpoint:
      type: string
      description: Override the official default endpoint or source page.
      default: https://www.cms.gov/data-research/statistics-trends-reports/marketplace-products/2026-marketplace-open-enrollment-period-public-use-files
    params:
      type: object
      description: Query parameters for API endpoints or source pages.
    mode:
      type: string
      enum:
      - json
      - html_links
      description: Fetch JSON rows or extract public links from an official page.
      default: html_links
    search:
      type: string
      description: Optional link filter used when mode is html_links.
      default: Marketplace
    limit:
      type: integer
      description: Maximum rows or links to return.
      default: 25
output_schema:
  type: object
  required:
  - dataset_ref
  - endpoint
  - rows
  - retrieved_at
